<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Email Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3D2A23;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #2a1c17; }
        button:disabled { opacity: 0.6; }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .result.show { display: block; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        #log {
            margin-top: 20px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2>Simple EmailJS Test</h2>
    <p>Fill out this simple form to test EmailJS:</p>
    
    <input type="text" id="name" placeholder="Your Name" value="Test User">
    <input type="email" id="email" placeholder="Your Email" value="test@example.com">
    <input type="tel" id="phone" placeholder="Phone" value="1234567890">
    <textarea id="message" rows="3" placeholder="Message">This is a test message.</textarea>
    
    <button onclick="sendEmail()" id="btn">Send Test Email</button>
    
    <div id="result" class="result"></div>
    <div id="log"></div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script>
        const logDiv = document.getElementById('log');
        
        function addLog(msg, isError = false) {
            const entry = document.createElement('div');
            entry.style.color = isError ? '#dc3545' : '#28a745';
            entry.textContent = new Date().toLocaleTimeString() + ': ' + msg;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }
        
        addLog('Page loaded');
        
        // Check if EmailJS loaded
        if (typeof emailjs === 'undefined') {
            addLog('ERROR: EmailJS not loaded!', true);
        } else {
            addLog('EmailJS library loaded successfully');
            emailjs.init('7a4aDkyYMIvgI1bPF');
            addLog('EmailJS initialized with public key');
        }
        
        function sendEmail() {
            const btn = document.getElementById('btn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            result.className = 'result';
            
            addLog('Starting email send...');
            
            const params = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value
            };
            
            addLog('Data: ' + JSON.stringify(params));
            addLog('Service ID: service_refoc0f');
            addLog('Template ID: template_87xqsqe');
            
            emailjs.send('service_refoc0f', 'template_87xqsqe', params)
                .then(function(response) {
                    addLog('SUCCESS! Status: ' + response.status);
                    result.className = 'result success show';
                    result.innerHTML = '✅ Email sent successfully! Check rskontam1000@gmail.com';
                    btn.disabled = false;
                    btn.textContent = 'Send Another Test';
                }, function(error) {
                    addLog('ERROR: ' + JSON.stringify(error), true);
                    result.className = 'result error show';
                    result.innerHTML = '❌ Failed: ' + (error.text || error.message || 'Unknown error') + 
                                      '<br>Status: ' + (error.status || 'N/A');
                    btn.disabled = false;
                    btn.textContent = 'Try Again';
                });
        }
    </script>
</body>
</html>
